AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  JumpCloudApiKey:
    Type: String
    NoEcho: true
    MinLength: 1
    Description: 'Your JumpCloud API Key, or your Service Account credentials (secretID:secretToken) if using ServiceToken auth.'
  JcAuthType:
    Type: String
    AllowedValues:
      - APIKey
      - ServiceToken
    Default: APIKey
    Description: 'Authentication method to use. ServiceToken performs an OAuth 2.0 exchange.'
  CronExpression:
    Type: String
    Default: '0 0 * * ? *'  
    Description: 'Cron expression for the schedule (e.g., "0 0 * * ? *"). Default to every day at midnight.'
  OrganizationID:
    Type: String
    Default: ''
    Description: 'OPTIONAL - A specific Org ID string, or the ARN of an AWS Secret containing a comma-separated list of Org IDs (requires JcMultiOrg=true).'
  JcMultiOrg:
    Type: String
    AllowedValues:
      - 'true'
      - 'false'
    Default: 'false'
    Description: 'Set to true if OrganizationID points to an AWS Secret containing a comma-separated list of Organization IDs.'
  Service:
    Type: String
    Default: "all"
    Description: 'Comma-delimited list of desired services to log. Available services: all, access_management, alerts, asset_management, directory, ldap, mdm, notifications, object_storage, password_manager, radius, reports, saas_app_management, software, sso, systems, workflows. Default value is "all"'
  JsonFormat:
    Type: String
    AllowedValues:
      - MultiLine
      - SingleLine
    Default: MultiLine
    Description: 'JSon output indent format - MultiLine or SingleLine'
  MaxEventsPerWorker:
    Type: Number
    Default: 25000
    Description: 'Maximum number of events a single worker will process before the orchestrator chunks the time window.'

Metadata:
  AWS::ServerlessRepo::Application:
    Name: JumpCloud-DirectoryInsights
    Description: This Serverless Application can be used to collect your JumpCloud Directory Insights data at a regular interval.
    Author: JumpCloud Solutions Architecture
    SemanticVersion: 3.1.0
    HomePageUrl: https://git.io/JJlrZ
    SourceCodeUrl: https://git.io/JJiMo
    LicenseUrl: LICENSE

Resources:
  # ---------------------------------------------------------
  # Storage and Encryption
  # ---------------------------------------------------------
  DirectoryInsightsBucket:
    Type: AWS::S3::Bucket

  DirectoryInsightsCmk:
    Type: AWS::KMS::Key
    Properties:
      Description: An Symmetric CMK for use in the JumpCloud Directory Insights Serverless App
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
        - Sid: Enable IAM User Permissions
          Effect: Allow
          Principal:
            AWS: 
              Fn::Sub: arn:aws:iam::${AWS::AccountId}:root
          Action: kms:*
          Resource: '*'
        - Sid: Allow use of the key by both Lambdas
          Effect: Allow
          Principal:
            AWS: 
              - !GetAtt OrchestratorRole.Arn
              - !GetAtt WorkerRole.Arn
          Action:
          - kms:DescribeKey
          - kms:Encrypt
          - kms:Decrypt
          - kms:ReEncrypt*
          - kms:GenerateDataKey
          - kms:GenerateDataKeyWithoutPlaintext
          Resource: '*'

  JcApiKey:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: JumpCloud API Key or OAuth Client Credentials
      SecretString: !Ref JumpCloudApiKey

  JcApiResourcePolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      SecretId: !Ref JcApiKey
      ResourcePolicy:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            AWS: 
              - !GetAtt OrchestratorRole.Arn
              - !GetAtt WorkerRole.Arn
          Action: secretsmanager:GetSecretValue
          Resource: "*"

  # ---------------------------------------------------------
  # Queues for Orchestrator -> Worker communication
  # ---------------------------------------------------------
  JobDLQ:
    Type: AWS::SQS::Queue

  JobQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 900 # Matches Worker timeout
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt JobDLQ.Arn
        maxReceiveCount: 3

  # ---------------------------------------------------------
  # Orchestrator Role & Function
  # ---------------------------------------------------------
  OrchestratorRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Role for the Orchestrator Lambda
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: OrchestratorPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt JobQueue.Arn
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: "*" 

  OrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: get-jcdirectoryinsights.zip
      Handler: get-jcdirectoryinsights.jc_orchestrator
      MemorySize: 128
      Timeout: 120
      Runtime: python3.14
      Role: !GetAtt OrchestratorRole.Arn
      KmsKeyArn: !GetAtt DirectoryInsightsCmk.Arn
      Environment:
        Variables:
          JcApiKeyArn: !Ref JcApiKey
          JcAuthType: !Ref JcAuthType
          CronExpression: !Ref CronExpression
          service: !Sub ${Service}
          SqsQueueUrl: !Ref JobQueue
          OrgId: !Sub ${OrganizationID}
          JcMultiOrg: !Ref JcMultiOrg
          MaxEventsPerWorker: !Ref MaxEventsPerWorker
      Events:
        ScheduleDirectoryInsightsTrigger:
          Type: Schedule
          Properties:
            Schedule: !Sub "cron(${CronExpression})"
            
  # ---------------------------------------------------------
  # Worker Role & Function
  # ---------------------------------------------------------
  WorkerRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Role for the Worker Lambda
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSLambdaExecute 
      Policies:
        - PolicyName: WorkerPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt JobQueue.Arn
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: '*'

  WorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: get-jcdirectoryinsights.zip
      Handler: get-jcdirectoryinsights.jc_worker
      MemorySize: 512
      Timeout: 900
      Runtime: python3.14
      Role: !GetAtt WorkerRole.Arn
      KmsKeyArn: !GetAtt DirectoryInsightsCmk.Arn
      Environment:
        Variables:
          JcApiKeyArn: !Ref JcApiKey
          JcAuthType: !Ref JcAuthType
          BucketName: !Ref DirectoryInsightsBucket
          JsonFormat: !Sub ${JsonFormat}
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt JobQueue.Arn
            BatchSize: 1