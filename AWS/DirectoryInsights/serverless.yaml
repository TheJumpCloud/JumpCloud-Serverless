AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::Serverless-2016-10-31

Parameters:
  JumpCloudApiKey:
    Type: String
    NoEcho: true
    MinLength: 1
  CronExpression:
    Type: String
    Default: '0 0 * * ? *'  # Default to every day at midnight
    Description: Cron expression for the schedule (e.g., "0 0 * * ? *").
  OrganizationID:
    Type: String
    Default: ''
    Description: OPTIONAL - This parameter can be used to allow MTP Admins to select which Organization they would like to collect Directory Insights data for.
  Service:
    Type: String
    Default: "all"
    Description: 'Comma-delimited list of desired services to log. Available services: all, access_management, alerts, asset_management, directory, ldap, mdm, notifications, object_storage, password_manager, radius, reports, saas_app_management, software, sso, systems, workflows. Default value is "all"'
  JsonFormat:
    Type: String
    AllowedValues:
      - MultiLine
      - SingleLine
    Default: MultiLine
    Description: 'JSon output indent format - MultiLine or SingleLine'

Metadata:
  AWS::ServerlessRepo::Application:
    Name: JumpCloud-DirectoryInsights
    Description: This Serverless Application can be used to collect your JumpCloud Directory Insights data at a regular interval.
    Author: JumpCloud Solutions Architecture
    SemanticVersion: 3.0.0
    HomePageUrl: https://git.io/JJlrZ
    SourceCodeUrl: https://git.io/JJiMo
    LicenseUrl: LICENSE

Resources:
  # ---------------------------------------------------------
  # Storage and Encryption
  # ---------------------------------------------------------
  DirectoryInsightsBucket:
    Type: AWS::S3::Bucket

  DirectoryInsightsCmk:
    Type: AWS::KMS::Key
    Properties:
      Description: An Symmetric CMK for use in the JumpCloud Directory Insights Serverless App
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
        - Sid: Enable IAM User Permissions
          Effect: Allow
          Principal:
            AWS: 
              Fn::Sub: arn:aws:iam::${AWS::AccountId}:root
          Action: kms:*
          Resource: '*'
        - Sid: Allow use of the key by both Lambdas
          Effect: Allow
          Principal:
            AWS: 
              - !GetAtt OrchestratorRole.Arn
              - !GetAtt WorkerRole.Arn
          Action:
          - kms:DescribeKey
          - kms:Encrypt
          - kms:Decrypt
          - kms:ReEncrypt*
          - kms:GenerateDataKey
          - kms:GenerateDataKeyWithoutPlaintext
          Resource: '*'

  JcApiKey:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: JumpCloud API Key
      SecretString: !Ref JumpCloudApiKey

  JcApiResourcePolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      SecretId: !Ref JcApiKey
      ResourcePolicy:
        Version: 2012-10-17
        Statement:
        - Effect: Allow
          Principal:
            AWS: 
              - !GetAtt OrchestratorRole.Arn
              - !GetAtt WorkerRole.Arn
          Action: secretsmanager:GetSecretValue
          Resource: "*"

  # ---------------------------------------------------------
  # Queues for Orchestrator -> Worker communication
  # ---------------------------------------------------------
  JobDLQ:
    Type: AWS::SQS::Queue

  JobQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 900 # Matches Worker timeout
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt JobDLQ.Arn
        maxReceiveCount: 3

  # ---------------------------------------------------------
  # Orchestrator Role & Function
  # ---------------------------------------------------------
  OrchestratorRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Role for the Orchestrator Lambda
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: OrchestratorPermissions
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt JobQueue.Arn

  OrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: get-jcdirectoryinsights.zip
      Handler: get-jcdirectoryinsights.jc_orchestrator
      MemorySize: 128
      Timeout: 120
      Runtime: python3.14
      Role: !GetAtt OrchestratorRole.Arn
      KmsKeyArn: !GetAtt DirectoryInsightsCmk.Arn
      Environment:
        Variables:
          JcApiKeyArn: !Ref JcApiKey
          CronExpression: !Ref CronExpression
          service: !Sub ${Service}
          SqsQueueUrl: !Ref JobQueue
          OrgId: !Sub ${OrganizationID}
      Events:
        ScheduleDirectoryInsightsTrigger:
          Type: Schedule
          Properties:
            Schedule: !Sub "cron(${CronExpression})"
  # ---------------------------------------------------------
  # Worker Role & Function
  # ---------------------------------------------------------
  WorkerRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Role for the Worker Lambda
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSLambdaExecute # Grants S3 PUT and CloudWatch Logs
      Policies:
        - PolicyName: WorkerPermissions
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt JobQueue.Arn
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: '*'

  WorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: get-jcdirectoryinsights.zip
      Handler: get-jcdirectoryinsights.jc_worker
      MemorySize: 512
      Timeout: 900
      Runtime: python3.14
      Role: !GetAtt WorkerRole.Arn
      KmsKeyArn: !GetAtt DirectoryInsightsCmk.Arn
      Environment:
        Variables:
          JcApiKeyArn: !Ref JcApiKey
          BucketName: !Ref DirectoryInsightsBucket
          OrgId: !Sub ${OrganizationID}
          JsonFormat: !Sub ${JsonFormat}
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt JobQueue.Arn
            BatchSize: 1


           